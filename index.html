<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadsBridge</title>
    <!-- tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css  -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header class="bg-white min-h-screen bg-gradient-to-b from-white via-orange-100 to-orange-200">
        <!-- nav bar -->
        <nav class="flex items-center justify-between px-10 py-6 max-w-7xl mx-auto sticky top-0 bg-transparent z-50">
            <div>
                <img src="./assets/Logo.png" alt="LeadsBridge Logo">
            </div>

            <div class="flex items-center gap-8">
                <a href="#" class="text-gray-600 font-medium  hover:text-orange-500">Services</a>
                <a href="#" class="text-gray-600 font-medium hover:text-orange-500">About</a>
                <a href="#" class="text-gray-600 font-medium hover:text-orange-500">Contact</a>
                <button
                    class="bg-[#FFA500] text-white px-6 py-2 rounded-full font-bold  shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-none transition-all">
                    Book a Free Consultation
                </button>
            </div>
        </nav>

        <!-- hero section -->
        <section
            class="relative flex flex-col items-center justify-center text-center pt-20 pb-40 px-4 max-w-5xl mx-auto">
            <div class="flex items-center gap-2 px-4 py-1 rounded-lg  mb-8">
                <img src="./assets/amazon.png" alt="amazon-logo">
                <span class="text-sm font-medium text-gray-700">Your Full-Service <span class="text-[#FFA500]">Amazon
                        Partner</span></span>
            </div>

            <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900">
                Turn Your Amazon Struggles<br>
                into Success—Save Time,</span><br>
                <span class="text-[#FFA500]">Maximize Profits!</span>
            </h1>

            <button
                class="mt-12 bg-[#FFA500] text-white px-10 py-3 rounded-full text-base font-bold b shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-none transition-all">
                Book a Free Consultation
            </button>

            <div
                class="hidden lg:block absolute left-[-10%] top-1/2 -translate-y-1/2 -rotate-12 bg-white p-4 rounded-2xl shadow-xl border border-gray-100 w-48">
                <p class="text-xs font-bold text-gray-800 mb-4 text-left">Total Incomes</p>
                <div class="flex items-end justify-between h-20">
                    <div class="w-3 bg-gray-100 h-1/2 rounded-full"></div>
                    <div class="w-3 bg-gray-100 h-3/4 rounded-full"></div>
                    <div class="w-3 bg-gray-100 h-2/3 rounded-full"></div>
                    <div class="w-3 bg-orange-400 h-full rounded-full"></div>
                    <div class="w-3 bg-gray-100 h-2/3 rounded-full"></div>
                    <div class="w-3 bg-gray-100 h-1/2 rounded-full"></div>
                </div>
                <div class="flex justify-between mt-2 text-[8px] text-gray-400">
                    <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span>
                </div>
            </div>

            <div
                class="hidden lg:block absolute right-[-10%] top-1/3 bg-white p-4 rounded-2xl shadow-xl border border-gray-100 rotate-15 ">
                <div class="flex items-center gap-3">
                    <div class="flex -space-x-2">
                        <img src="./assets/image (2).png" class="w-8 h-8 rounded-full border-2 border-white">
                        <img src="./assets/image (1).png" class="w-8 h-8 rounded-full border-2 border-white">
                        <img src="./assets/image.png" class="w-8 h-8 rounded-full border-2 border-white">
                    </div>
                    <div class="text-left">
                        <p class="text-lg font-bold text-gray-800">45k+ Users</p>
                        <p class="text-sm text-orange-400">★ <span class="text-gray-600"> 4.7 Rating</span></p>
                    </div>
                </div>
            </div>
        </section>

    </header>


    <main>

        <!-- Amazon Market Statistics section -->
        <section class="px-10 py-6 max-w-7xl mx-auto">
            <h1 class="">Amazon Market Statistics Worldwide 2024</h1>
        </section>

    </main>

</body>

</html>
